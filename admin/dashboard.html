<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenDogo Admin Dashboard</title>
    <style>
      body { font-family: Arial, sans-serif; max-width: 1000px; margin: 24px auto; padding: 0 16px; }
      button { margin-right: 8px; margin-bottom: 8px; padding: 8px 14px; }
      pre { background: #111; color: #f8f8f8; padding: 12px; overflow: auto; border-radius: 8px; }
      .hint { color: #555; }
    </style>
  </head>
  <body>
    <h2>管理后台联调页</h2>
    <p class="hint">用于快速验证 API：用户、卡密、RPC、统计。</p>
    <button onclick="loadAll()">加载数据</button>
    <button onclick="logout()">退出登录</button>
    <pre id="out"></pre>

    <script src="/admin/config.js"></script>
    <script>
      const API_BASE = (window.__APP_CONFIG__?.API_BASE_URL || window.location.origin).replace(/\/$/, '');

      async function api(path){
        const token = localStorage.getItem('token');
        const res = await fetch(`${API_BASE}/api/admin${path}`, {
          headers: { Authorization: `Bearer ${token}` }
        });

        let data;
        try { data = await res.json(); } catch { data = { message: 'invalid json response' }; }
        return { status: res.status, data };
      }

      async function loadAll(){
        const [summary, users, cards, rpc] = await Promise.all([
          api('/dashboard/summary'), api('/users'), api('/cards'), api('/rpc/nodes')
        ]);
        out.textContent = JSON.stringify({ summary, users, cards, rpc }, null, 2);
      }

      function logout(){
        localStorage.removeItem('token');
        location.href = '/admin/login.html';
      }
    </script>
  </body>
</html>
