<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenDogo 后台登录</title>
    <style>
      body { font-family: Arial, sans-serif; max-width: 520px; margin: 40px auto; padding: 0 16px; }
      .card { border: 1px solid #ddd; border-radius: 10px; padding: 16px; }
      input, button { width: 100%; margin: 8px 0; padding: 10px; }
      #msg { color: #b30000; min-height: 20px; }
      .hint { color: #666; font-size: 12px; }
    </style>
  </head>
  <body>
    <h2>OpenDogo 管理后台</h2>
    <div class="card">
      <input id="apiBase" placeholder="API 地址（默认同域）" />
      <input id="account" placeholder="邮箱（Supabase）或账号（回退模式）" autocomplete="username" />
      <input id="password" placeholder="密码" type="password" autocomplete="current-password" />
      <button id="saveApiBtn">保存 API 地址</button>
      <button id="loginBtn">登录</button>
      <p class="hint">当前 API：<span id="currentApi"></span></p>
      <p id="msg"></p>
    </div>

    <script src="/admin/config.js"></script>
    <script>
      const API_BASE = (window.__APP_CONFIG__?.API_BASE_URL || window.location.origin).replace(/\/$/, '');
      apiBase.value = API_BASE;
      currentApi.textContent = API_BASE;

      saveApiBtn.onclick = () => {
        const v = apiBase.value.trim().replace(/\/$/, '');
        if (!v) return;
        localStorage.setItem('OPENDOGO_API_BASE_URL', v);
        location.reload();
      };

      loginBtn.onclick = async () => {
        try {
          msg.textContent = '';
          const pre = await fetch(`${API_BASE}/api/admin/auth/prelogin`, {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({account:account.value,password:password.value})
          });

          const preData = await pre.json();
          if(!pre.ok){ msg.textContent = preData.message || '账号或密码错误'; return; }

          const code = prompt('请输入 Google Authenticator 验证码（30秒刷新）');
          if(!code){ msg.textContent = '已取消验证码输入'; return; }

          const login = await fetch(`${API_BASE}/api/admin/auth/login`, {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({preAuthToken: preData.preAuthToken, code})
          });
          const loginData = await login.json();
          if(!login.ok){ msg.textContent = loginData.message || '验证码错误'; return; }

          localStorage.setItem('token', loginData.token);
          location.href = '/admin/dashboard.html';
        } catch (error) {
          msg.textContent = error.message || '网络错误，请稍后重试';
        }
      };
    </script>
  </body>
</html>
