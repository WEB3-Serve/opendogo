<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - ENS Manager</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2563EB;
            --primary-hover: #1D4ED8;
            --bg: #F9FAFB;
            --card: #FFFFFF;
            --text: #1F2937;
            --text-light: #6B7280;
            --border: #E5E7EB;
            --danger: #DC2626;
            --success: #059669;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: var(--card);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 420px;
            padding: 48px 40px;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--primary), #7C3AED);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }

        .logo-icon i {
            font-size: 32px;
            color: white;
        }

        .logo-section h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 8px;
        }

        .logo-section p {
            color: var(--text-light);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
            font-size: 16px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px 12px 44px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.2s;
            background: var(--bg);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .form-input.error {
            border-color: var(--danger);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn i.fa-spinner {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            background: rgba(220, 38, 38, 0.1);
            color: var(--danger);
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
        }

        .hidden {
            display: none;
        }

        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .security-hint {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
            text-align: center;
        }

        .security-hint p {
            font-size: 13px;
            color: var(--text-light);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .security-hint i {
            color: var(--success);
        }

        .role-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 8px;
        }

        .role-admin {
            background: rgba(37, 99, 235, 0.1);
            color: var(--primary);
        }

        .role-manager {
            background: rgba(5, 150, 105, 0.1);
            color: var(--success);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-section">
            <div class="logo-icon">
                <i class="fas fa-key"></i>
            </div>
            <h1>管理员登录</h1>
            <p>卡密管理系统</p>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <form id="loginForm" class="fade-in">
            <div class="form-group">
                <label for="email">邮箱</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" class="form-input" placeholder="请输入管理员邮箱" required autocomplete="email">
                </div>
            </div>

            <div class="form-group">
                <label for="password">密码</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" class="form-input" placeholder="请输入密码" required autocomplete="current-password">
                </div>
            </div>

            <button type="submit" class="btn" id="submitBtn">
                <span>登录</span>
                <i class="fas fa-arrow-right"></i>
            </button>
        </form>

        <div class="security-hint">
            <p>
                <i class="fas fa-lock"></i>
                仅限管理员和卡密管理员访问
            </p>
            <a href="/index.html" style="display: inline-block; margin-top: 12px; font-size: 13px; color: var(--primary); text-decoration: none;">
                <i class="fas fa-home"></i>
                返回首页
            </a>
        </div>
    </div>

    <script>
        const API_BASE = '/api'

        const loginForm = document.getElementById('loginForm')
        const errorMessage = document.getElementById('errorMessage')

        function showError(message) {
            errorMessage.textContent = message
            errorMessage.style.display = 'block'
            setTimeout(() => {
                errorMessage.style.display = 'none'
            }, 5000)
        }

        function setLoading(btn, loading) {
            if (loading) {
                btn.disabled = true
                const icon = btn.querySelector('i')
                icon.className = 'fas fa-spinner'
            } else {
                btn.disabled = false
                const icon = btn.querySelector('i')
                icon.className = 'fas fa-arrow-right'
            }
        }

        // Login with email and password
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault()
            const email = document.getElementById('email').value.trim()
            const password = document.getElementById('password').value

            const btn = document.getElementById('submitBtn')
            setLoading(btn, true)

            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                })

                const data = await response.json()

                if (!response.ok) {
                    throw new Error(data.message || '登录失败')
                }

                // Check if user has admin or card_manager role
                const user = data.data.user
                const isAdmin = user.role === 'admin' || user.role === 'super_admin'
                
                // Check if user is card manager
                let isCardManager = false
                if (!isAdmin) {
                    try {
                        const checkResponse = await fetch(`${API_BASE}/card-managers/check`, {
                            headers: { 'Authorization': `Bearer ${data.data.token}` }
                        })
                        if (checkResponse.ok) {
                            const checkData = await checkResponse.json()
                            isCardManager = checkData.data?.isManager || false
                        }
                    } catch (err) {
                        console.error('Check card manager error:', err)
                    }
                }

                if (!isAdmin && !isCardManager) {
                    throw new Error('您没有管理员权限，无法访问此系统')
                }

                // Store token and user info
                localStorage.setItem('admin_token', data.data.token)
                localStorage.setItem('admin_user', JSON.stringify({
                    ...user,
                    isCardManager
                }))
                
                // Redirect based on role
                if (isAdmin) {
                    // Admin can access full dashboard (future feature)
                    window.location.href = '/admin/dashboard.html'
                } else {
                    // Card manager only has access to card generation
                    window.location.href = '/admin/dashboard.html'
                }
            } catch (error) {
                console.error('Login error:', error)
                showError(error.message || '登录失败，请检查账号和密码')
                setLoading(btn, false)
            }
        })

        // Auto-focus email field
        document.getElementById('email').focus()
    </script>
</body>
</html>
