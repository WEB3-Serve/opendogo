<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>后台登录（猫头鹰防窥动画）</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; form-action 'self'; base-uri 'self'" />
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --line: #1f2937;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --danger: #ef4444;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(circle at top, #172554 0%, var(--bg) 45%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .card {
      width: min(420px, 100%);
      background: rgba(17, 24, 39, 0.95);
      border: 1px solid #334155;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 10px 28px rgba(2, 6, 23, 0.45);
    }

    .title {
      margin: 0 0 14px;
      text-align: center;
      font-size: 1.25rem;
      letter-spacing: .4px;
    }

    .owl-wrap { display: grid; place-items: center; margin-bottom: 16px; }

    .owl {
      width: 156px;
      height: 116px;
      position: relative;
      background: #92400e;
      border-radius: 70px 70px 55px 55px;
      border: 2px solid #78350f;
    }

    .eye {
      position: absolute;
      top: 24px;
      width: 46px;
      height: 46px;
      background: #fff;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid #d1d5db;
    }

    .eye.left { left: 20px; }
    .eye.right { right: 20px; }

    .pupil {
      position: absolute;
      top: 15px;
      left: 15px;
      width: 14px;
      height: 14px;
      background: #111827;
      border-radius: 50%;
      transition: transform .14s ease-out;
    }

    .wing {
      position: absolute;
      top: 58px;
      width: 26px;
      height: 56px;
      background: #78350f;
      border-radius: 18px;
      border: 2px solid #5b2b0b;
      transform-origin: top;
      transition: transform .24s ease;
    }

    .wing.left { left: -8px; }
    .wing.right { right: -8px; }

    .owl.cover .wing.left { transform: translate(34px, -18px) rotate(-38deg); }
    .owl.cover .wing.right { transform: translate(-34px, -18px) rotate(38deg); }

    .beak {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      top: 64px;
      width: 0;
      height: 0;
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-top: 14px solid #f59e0b;
    }

    .field { margin-bottom: 14px; }

    label {
      display: block;
      margin: 0 0 6px;
      font-size: .88rem;
      color: var(--muted);
    }

    input {
      width: 100%;
      border: 1px solid #334155;
      border-radius: 10px;
      background: #0b1220;
      color: var(--text);
      padding: 11px 12px;
      font-size: .95rem;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, .22);
    }

    .btn {
      width: 100%;
      border: 0;
      border-radius: 10px;
      padding: 11px 12px;
      color: #fff;
      background: var(--accent);
      font-weight: 700;
      cursor: pointer;
    }

    .btn:hover { background: var(--accent-hover); }

    .msg {
      margin-top: 10px;
      min-height: 1.25rem;
      font-size: .86rem;
    }

    .msg.error { color: var(--danger); }
    .msg.ok { color: #22c55e; }

    .tips {
      margin-top: 16px;
      padding: 10px 12px;
      border: 1px dashed #334155;
      border-radius: 10px;
      color: #cbd5e1;
      font-size: .8rem;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1 class="title">后台登录</h1>

    <div class="owl-wrap" aria-hidden="true">
      <div class="owl" id="owl">
        <div class="eye left"><div class="pupil"></div></div>
        <div class="eye right"><div class="pupil"></div></div>
        <div class="wing left"></div>
        <div class="wing right"></div>
        <div class="beak"></div>
      </div>
    </div>

    <form id="loginForm" method="post" action="/api/admin/login" novalidate>
      <div class="field">
        <label for="username">账号</label>
        <input id="username" name="username" type="text" required minlength="3" maxlength="64" autocomplete="username" />
      </div>
      <div class="field">
        <label for="password">密码</label>
        <input id="password" name="password" type="password" required minlength="8" maxlength="128" autocomplete="current-password" />
      </div>
      <button class="btn" type="submit">登录</button>
      <div class="msg" id="msg" role="status" aria-live="polite"></div>
    </form>

    <section class="tips">
      <strong>安全建议：</strong>前端动画仅用于交互，真正安全依赖后端：密码哈希（Argon2/bcrypt）、CSRF 防护、登录限流、2FA、HttpOnly+Secure Cookie。
    </section>
  </main>

  <script>
    const owl = document.getElementById('owl');
    const form = document.getElementById('loginForm');
    const username = document.getElementById('username');
    const password = document.getElementById('password');
    const msg = document.getElementById('msg');

    const pupils = [...document.querySelectorAll('.pupil')];

    function trackEyes(evt) {
      const rect = evt.target.getBoundingClientRect();
      const ratio = (evt.clientX - rect.left) / rect.width;
      const offset = Math.max(-5, Math.min(5, (ratio - 0.5) * 10));
      pupils.forEach((pupil) => {
        pupil.style.transform = `translateX(${offset}px)`;
      });
    }

    username.addEventListener('mousemove', trackEyes);
    username.addEventListener('focus', () => owl.classList.remove('cover'));

    password.addEventListener('focus', () => owl.classList.add('cover'));
    password.addEventListener('blur', () => owl.classList.remove('cover'));

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      msg.className = 'msg';
      msg.textContent = '';

      if (!form.checkValidity()) {
        msg.classList.add('error');
        msg.textContent = '请输入合法账号和密码（密码至少 8 位）。';
        return;
      }

      const payload = {
        username: username.value.trim(),
        password: password.value
      };

      try {
        const res = await fetch(form.action, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify(payload)
        });

        if (!res.ok) {
          msg.classList.add('error');
          msg.textContent = '登录失败，请检查账号密码。';
          return;
        }

        msg.classList.add('ok');
        msg.textContent = '登录成功，正在跳转...';
      } catch {
        msg.classList.add('error');
        msg.textContent = '网络错误，请稍后重试。';
      }
    });
  </script>
</body>
</html>
