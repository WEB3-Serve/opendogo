<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENS Manager Pro - 专业域名解析工具</title>
    <meta name="description" content="高性能 ENS 域名查询与管理工具">
    
    <style>
        :root { --primary: #3b82f6; --bg: #0f172a; --text: #e2e8f0; }
        body { margin: 0; font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; user-select: none; -webkit-user-select: none; }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .hero { text-align: center; padding: 4rem 0; }
        .input-group { display: flex; gap: 1rem; max-width: 600px; margin: 2rem auto; position: relative; z-index: 10; }
        input { flex: 1; padding: 1rem; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: white; font-size: 1rem; outline: none; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3); }
        button { padding: 1rem 2rem; border-radius: 8px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; transition: transform 0.2s; }
        button:hover { transform: translateY(-2px); opacity: 0.9; }
        #result-area { margin-top: 2rem; min-height: 200px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #security-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; display: none; justify-content: center; align-items: center; color: red; font-size: 2rem; font-weight: bold; }
        ::selection { background: transparent; }
        ::-moz-selection { background: transparent; }
    </style>
</head>
<body oncontextmenu="return false;">
    <div id="security-overlay">⚠️ 非法操作 detected</div>
    <div class="container">
        <div class="hero">
            <h1>ENS Manager <span style="color:var(--primary)">Pro</span></h1>
            <p>企业级域名解析与管理系统</p>
        </div>
        <div class="input-group">
            <input type="text" id="domainInput" placeholder="输入域名 (例如：vitalik.eth)" autocomplete="off">
            <button id="queryBtn" onclick="app.initQuery()">查询</button>
        </div>
        <div id="loader" class="loader"></div>
        <div id="result-area"></div>
    </div>
    <script>
        (function() {
            document.addEventListener('contextmenu', event => event.preventDefault());
            document.onkeydown = function(e) {
                if (e.keyCode == 123) return false;
                if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false;
                if (e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false;
                if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
                if (e.ctrlKey && e.keyCode == 'S'.charCodeAt(0)) return false;
                if (e.ctrlKey && e.keyCode == 'C'.charCodeAt(0)) return false;
            };
            setInterval(() => {
                const threshold = 160;
                if (window.outerWidth - window.innerWidth > threshold || window.outerHeight - window.innerHeight > threshold) {
                    document.body.innerHTML = '';
                    document.getElementById('security-overlay').style.display = 'flex';
                }
            }, 1000);
        })();
        const script = document.createElement('script');
        script.src = '/js/core-logic.min.js?v=' + Date.now();
        document.head.appendChild(script);
    </script>
</body>
</html>
