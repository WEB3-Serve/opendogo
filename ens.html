<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenDoGo - 用户登录注册</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            width: 100%;
            max-width: 420px;
            position: relative;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .form-container {
            padding: 40px 30px;
        }

        .tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            font-weight: 500;
            color: #666;
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
        }

        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab:hover {
            color: #667eea;
        }

        .form {
            display: none;
        }

        .form.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-group {
            margin-bottom: 25px;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-group input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .divider {
            text-align: center;
            margin: 25px 0;
            color: #999;
            font-size: 14px;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: #e0e0e0;
        }

        .divider::before { left: 0; }
        .divider::after { right: 0; }

        .home-link {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        .home-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .home-link a:hover {
            text-decoration: underline;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .user-info {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .user-info.show {
            display: block;
        }

        .user-avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 32px;
            color: white;
            font-weight: bold;
        }

        .user-email {
            font-size: 18px;
            color: #333;
            margin-bottom: 10px;
        }

        .user-id {
            font-size: 12px;
            color: #999;
            margin-bottom: 20px;
        }

        .logout-btn {
            background: #dc3545;
        }

        .logout-btn:hover {
            box-shadow: 0 10px 20px rgba(220, 53, 69, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 OpenDoGo</h1>
            <p>欢迎使用我们的服务</p>
        </div>

        <div class="form-container">
            <!-- 消息提示 -->
            <div id="message" class="message"></div>

            <!-- 登录表单 -->
            <div id="loginForm" class="form active">
                <div class="input-group">
                    <label for="loginEmail">邮箱地址</label>
                    <input type="email" id="loginEmail" placeholder="请输入您的邮箱" required>
                </div>
                <div class="input-group">
                    <label for="loginPassword">密码</label>
                    <input type="password" id="loginPassword" placeholder="请输入密码" required>
                </div>
                <button class="btn" onclick="handleLogin()" id="loginBtn">
                    登录
                </button>
            </div>

            <!-- 注册表单 -->
            <div id="registerForm" class="form">
                <div class="input-group">
                    <label for="registerEmail">邮箱地址</label>
                    <input type="email" id="registerEmail" placeholder="请输入您的邮箱" required>
                </div>
                <div class="input-group">
                    <label for="registerPassword">密码</label>
                    <input type="password" id="registerPassword" placeholder="请设置密码（至少 6 位）" minlength="6" required>
                </div>
                <div class="input-group">
                    <label for="confirmPassword">确认密码</label>
                    <input type="password" id="confirmPassword" placeholder="请再次输入密码" required>
                </div>
                <button class="btn" onclick="handleRegister()" id="registerBtn">
                    注册
                </button>
            </div>

            <!-- 用户信息 -->
            <div id="userInfo" class="user-info">
                <div class="user-avatar" id="userAvatar">U</div>
                <div class="user-email" id="userEmail"></div>
                <div class="user-id" id="userId"></div>
                <button class="btn logout-btn" onclick="handleLogout()">退出登录</button>
            </div>

            <div class="divider">或者</div>

            <div class="home-link" style="text-align: center; margin-top: 20px;">
                <a href="/" style="color: #667eea; text-decoration: none; font-size: 14px; font-weight: 500;">🏠 返回首页</a>
            </div>
        </div>
    </div>

    <script>
        // API 基础路径 - 自动适配当前域名
        const API_BASE = '/api';

        // 切换标签页
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
            
            if (tab === 'login') {
                document.getElementById('loginForm').classList.add('active');
                event.target.classList.add('active');
            } else {
                document.getElementById('registerForm').classList.add('active');
                event.target.classList.add('active');
            }
            
            hideMessage();
        }

        // 显示消息
        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + type;
        }

        // 隐藏消息
        function hideMessage() {
            document.getElementById('message').className = 'message';
        }

        // 设置按钮加载状态
        function setButtonLoading(btnId, loading) {
            const btn = document.getElementById(btnId);
            if (loading) {
                btn.disabled = true;
                btn.innerHTML = '<span class="loading"></span>处理中...';
            } else {
                btn.disabled = false;
                btn.innerHTML = btnId === 'loginBtn' ? '登录' : '注册';
            }
        }

        // 处理登录
        async function handleLogin() {
            hideMessage();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                showMessage('请填写邮箱和密码', 'error');
                return;
            }

            setButtonLoading('loginBtn', true);

            try {
                const response = await fetch(`${API_BASE}/user/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password }),
                });

                const data = await response.json();

                if (data.success) {
                    // 保存 token
                    localStorage.setItem('userToken', data.token);
                    localStorage.setItem('userEmail', data.user.email);
                    localStorage.setItem('userId', data.user.id);
                    
                    showMessage('登录成功！正在跳转...', 'success');
                    setTimeout(() => {
                        showUserInfo(data.user);
                    }, 1000);
                } else {
                    showMessage(data.message || '登录失败', 'error');
                }
            } catch (error) {
                console.error('Login error:', error);
                showMessage('网络错误，请稍后重试', 'error');
            } finally {
                setButtonLoading('loginBtn', false);
            }
        }

        // 处理注册
        async function handleRegister() {
            hideMessage();
            const email = document.getElementById('registerEmail').value.trim();
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!email || !password || !confirmPassword) {
                showMessage('请填写所有字段', 'error');
                return;
            }

            if (password !== confirmPassword) {
                showMessage('两次输入的密码不一致', 'error');
                return;
            }

            if (password.length < 6) {
                showMessage('密码长度至少为 6 位', 'error');
                return;
            }

            setButtonLoading('registerBtn', true);

            try {
                const response = await fetch(`${API_BASE}/user/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password }),
                });

                const data = await response.json();

                if (data.success) {
                    showMessage(data.message, 'success');
                    // 清空表单
                    document.getElementById('registerEmail').value = '';
                    document.getElementById('registerPassword').value = '';
                    document.getElementById('confirmPassword').value = '';
                } else {
                    showMessage(data.message || '注册失败', 'error');
                }
            } catch (error) {
                console.error('Register error:', error);
                showMessage('网络错误，请稍后重试', 'error');
            } finally {
                setButtonLoading('registerBtn', false);
            }
        }

        // 显示用户信息
        function showUserInfo(user) {
            document.getElementById('loginForm').classList.remove('active');
            document.getElementById('registerForm').classList.remove('active');
            document.getElementById('userInfo').classList.add('show');
            
            document.getElementById('userEmail').textContent = user.email || localStorage.getItem('userEmail');
            document.getElementById('userId').textContent = 'ID: ' + (user.id || localStorage.getItem('userId'));
            document.getElementById('userAvatar').textContent = (user.email || localStorage.getItem('userEmail'))[0].toUpperCase();
        }

        // 处理登出
        function handleLogout() {
            localStorage.removeItem('userToken');
            localStorage.removeItem('userEmail');
            localStorage.removeItem('userId');
            
            document.getElementById('userInfo').classList.remove('show');
            document.getElementById('loginForm').classList.add('active');
            document.getElementById('loginEmail').value = '';
            document.getElementById('loginPassword').value = '';
            
            showMessage('已退出登录', 'success');
        }

        // 页面加载时检查登录状态
        window.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('userToken');
            const email = localStorage.getItem('userEmail');
            
            if (token && email) {
                showUserInfo({ email });
            }
        });
    </script>
</body>
</html>
