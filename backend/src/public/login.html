<!doctype html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Admin Login</title></head>
<body>
  <h2>后台登录</h2>
  <input id="account" placeholder="账号" />
  <input id="password" placeholder="密码" type="password" />
  <button id="loginBtn">登录</button>
  <p id="msg"></p>
  <script>
    loginBtn.onclick = async () => {
      msg.textContent = '';
      const pre = await fetch('/api/admin/auth/prelogin', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({account:account.value,password:password.value})
      });
      const preData = await pre.json();
      if(!pre.ok){ msg.textContent = preData.message || '账号或密码错误'; return; }

      const code = prompt('请输入谷歌验证码（30秒刷新）');
      if(!code){ msg.textContent = '已取消验证码输入'; return; }

      const login = await fetch('/api/admin/auth/login', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({preAuthToken: preData.preAuthToken, code})
      });
      const loginData = await login.json();
      if(!login.ok){ msg.textContent = loginData.message || '验证码错误'; return; }

      localStorage.setItem('token', loginData.token);
      location.href = '/dashboard.html';
    };
  </script>
</body></html>
