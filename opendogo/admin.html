<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenDogo 管理后台</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/antd@5.27.0/dist/reset.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/antd@5.27.0/dist/antd.min.css" />
  <link rel="stylesheet" href="./admin.css" />
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://cdn.jsdelivr.net/npm/antd@5.27.0/dist/antd.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const {
      Layout,
      Menu,
      Card,
      Row,
      Col,
      Statistic,
      Table,
      Form,
      Input,
      InputNumber,
      Button,
      Modal,
      Space,
      Tabs,
      Switch,
      Select,
      Tag,
      Typography,
      message
    } = antd;

    const { Header, Sider, Content } = Layout;
    const { Title, Text } = Typography;

    const SESSION_KEY = 'opendogo_admin_token';

    const menuItems = [
      { key: 'dashboard', label: '仪表盘' },
      {
        key: 'user-management',
        label: '用户管理',
        children: [
          { key: 'user-list', label: '用户列表' },
          { key: 'user-groups', label: '用户分组' },
          { key: 'user-activation-records', label: '用户激活记录' }
        ]
      },
      {
        key: 'card-management',
        label: '卡密管理',
        children: [
          { key: 'card-list', label: '卡密列表' },
          { key: 'card-rules', label: '卡密规则' },
          { key: 'card-groups', label: '卡密分组' }
        ]
      },
      {
        key: 'site-management',
        label: '网站管理',
        children: [
          { key: 'site-config', label: '网站配置' },
          { key: 'ens-query-config', label: 'ENS查询配置' },
          { key: 'notice-management', label: '公告管理' }
        ]
      },
      {
        key: 'system-settings',
        label: '系统设置',
        children: [
          { key: 'basic-settings', label: '基础设置' },
          { key: 'security-settings', label: '安全设置' },
          { key: 'api-settings', label: '接口设置' }
        ]
      }
    ];

    const dashboardStats = {
      users: 184,
      activeUsers: 132,
      cards: 367,
      activatedCards: 238
    };

    const userRows = [
      { key: '1', walletAddress: '0x52...ab9', group: '普通用户', status: '激活', createdAt: '2026-03-21 11:20' },
      { key: '2', walletAddress: '0x87...de1', group: '高级用户', status: '未激活', createdAt: '2026-03-20 17:10' }
    ];

    const userGroupRows = [
      { key: '1', name: '普通用户', count: 140, remark: '默认分组' },
      { key: '2', name: '高级用户', count: 44, remark: '付费用户' }
    ];

    const activationRows = [
      { key: '1', walletAddress: '0x52...ab9', cardCode: 'ENS-2026-001', activeAt: '2026-03-22 09:00', expiredAt: '2026-04-22 09:00' },
      { key: '2', walletAddress: '0x11...ca0', cardCode: 'ENS-2026-002', activeAt: '2026-03-22 10:33', expiredAt: '2027-03-22 10:33' }
    ];

    const cardRows = [
      { key: '1', code: 'ENS-DAY-001', type: 'DAY', group: '测试组', used: false },
      { key: '2', code: 'ENS-MONTH-101', type: 'MONTH', group: '正式组', used: true }
    ];

    const cardRuleRows = [
      { key: '1', name: '日卡规则', type: 'DAY', amount: 1, enabled: true },
      { key: '2', name: '年卡规则', type: 'YEAR', amount: 1, enabled: true }
    ];

    const cardGroupRows = [
      { key: '1', name: '测试组', count: 50 },
      { key: '2', name: '正式组', count: 317 }
    ];

    const defaultNoticeRows = [
      { key: '1', title: '系统维护通知', status: '已发布', publishAt: '2026-03-25 12:00' }
    ];

    function DashboardPanel() {
      return (
        <Space direction="vertical" size={16} style={{ width: '100%' }}>
          <Row gutter={[16, 16]}>
            <Col xs={24} md={12} xl={6}>
              <Card className="page-card"><Statistic title="总用户" value={dashboardStats.users} /></Card>
            </Col>
            <Col xs={24} md={12} xl={6}>
              <Card className="page-card"><Statistic title="已激活用户" value={dashboardStats.activeUsers} /></Card>
            </Col>
            <Col xs={24} md={12} xl={6}>
              <Card className="page-card"><Statistic title="总卡密" value={dashboardStats.cards} /></Card>
            </Col>
            <Col xs={24} md={12} xl={6}>
              <Card className="page-card"><Statistic title="已激活卡密" value={dashboardStats.activatedCards} /></Card>
            </Col>
          </Row>
          <Card className="page-card" title="系统状态">
            <Space direction="vertical">
              <Text>数据库：正常</Text>
              <Text>接口健康检查：正常</Text>
              <Text>最近一次审计记录：2026-03-25 13:26</Text>
            </Space>
          </Card>
        </Space>
      );
    }

    function App() {
      const [collapsed, setCollapsed] = React.useState(false);
      const [selectedKey, setSelectedKey] = React.useState('dashboard');
      const [loginOpen, setLoginOpen] = React.useState(true);
      const [noticeOpen, setNoticeOpen] = React.useState(false);
      const [notices, setNotices] = React.useState(defaultNoticeRows);
      const [token, setToken] = React.useState('');
      const [account, setAccount] = React.useState('');

      const [loginForm] = Form.useForm();
      const [siteForm] = Form.useForm();
      const [ensForm] = Form.useForm();
      const [noticeForm] = Form.useForm();
      const [settingForm] = Form.useForm();

      React.useEffect(() => {
        siteForm.setFieldsValue({ siteName: 'OpenDogo', contactEmail: 'admin@opendogo.com' });
        ensForm.setFieldsValue({ rpcEndpoint: 'https://mainnet.infura.io/v3/xxxx', timeoutMs: 15000, retryCount: 2, parallelRequests: 30 });
        settingForm.setFieldsValue({ siteOpen: true, force2FA: true, apiRateLimit: 120 });

        const localToken = localStorage.getItem(SESSION_KEY);
        if (!localToken) {
          setLoginOpen(true);
          return;
        }

        verifySession(localToken);
      }, []);

      const verifySession = async (sessionToken) => {
        try {
          const res = await fetch('/api/admin/verify', {
            method: 'GET',
            headers: { Authorization: `Bearer ${sessionToken}` }
          });
          const data = await res.json();
          if (!res.ok || !data.success) {
            throw new Error(data.message || '会话无效');
          }
          setToken(sessionToken);
          setAccount(data.account || '管理员');
          setLoginOpen(false);
        } catch (error) {
          localStorage.removeItem(SESSION_KEY);
          setToken('');
          setAccount('');
          setLoginOpen(true);
        }
      };

      const submitLogin = async (values) => {
        try {
          const res = await fetch('/api/admin/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              account: values.account,
              password: values.password,
              twoFactorCode: values.twoFactorCode
            })
          });

          const data = await res.json();
          if (!res.ok || !data.success) {
            throw new Error(data.message || '登录失败');
          }

          localStorage.setItem(SESSION_KEY, data.token);
          setToken(data.token);
          setAccount(data.account || values.account);
          setLoginOpen(false);
          loginForm.resetFields();
          message.success('登录成功');
        } catch (error) {
          message.error(error.message || '登录失败');
        }
      };

      const logout = () => {
        localStorage.removeItem(SESSION_KEY);
        setToken('');
        setAccount('');
        setLoginOpen(true);
        message.success('已退出登录');
      };

      const openPublishNotice = () => {
        noticeForm.resetFields();
        setNoticeOpen(true);
      };

      const publishNotice = async () => {
        try {
          const values = await noticeForm.validateFields();
          const next = {
            key: String(Date.now()),
            title: values.title,
            status: '已发布',
            publishAt: new Date().toLocaleString('zh-CN', { hour12: false })
          };
          setNotices((prev) => [next, ...prev]);
          setNoticeOpen(false);
          message.success('公告发布成功');
        } catch (_) {}
      };

      const saveForm = async (form) => {
        try {
          await form.validateFields();
          message.success('保存成功');
        } catch (_) {}
      };

      const userColumns = [
        { title: '钱包地址', dataIndex: 'walletAddress' },
        { title: '分组', dataIndex: 'group' },
        {
          title: '状态',
          dataIndex: 'status',
          render: (status) => status === '激活' ? <Tag color="success">激活</Tag> : <Tag color="default">未激活</Tag>
        },
        { title: '创建时间', dataIndex: 'createdAt' }
      ];

      const userGroupColumns = [
        { title: '分组名称', dataIndex: 'name' },
        { title: '用户数', dataIndex: 'count' },
        { title: '备注', dataIndex: 'remark' }
      ];

      const activationColumns = [
        { title: '钱包地址', dataIndex: 'walletAddress' },
        { title: '卡密', dataIndex: 'cardCode' },
        { title: '激活时间', dataIndex: 'activeAt' },
        { title: '到期时间', dataIndex: 'expiredAt' }
      ];

      const cardColumns = [
        { title: '卡密', dataIndex: 'code' },
        { title: '类型', dataIndex: 'type' },
        { title: '分组', dataIndex: 'group' },
        {
          title: '状态',
          dataIndex: 'used',
          render: (used) => used ? <Tag color="processing">已使用</Tag> : <Tag color="success">未使用</Tag>
        }
      ];

      const cardRuleColumns = [
        { title: '规则名称', dataIndex: 'name' },
        { title: '类型', dataIndex: 'type' },
        { title: '生成数量', dataIndex: 'amount' },
        {
          title: '状态',
          dataIndex: 'enabled',
          render: (enabled) => enabled ? <Tag color="success">启用</Tag> : <Tag color="default">禁用</Tag>
        }
      ];

      const cardGroupColumns = [
        { title: '分组名称', dataIndex: 'name' },
        { title: '卡密数量', dataIndex: 'count' }
      ];

      const noticeColumns = [
        { title: '标题', dataIndex: 'title' },
        { title: '状态', dataIndex: 'status' },
        { title: '发布时间', dataIndex: 'publishAt' }
      ];

      const renderPage = () => {
        switch (selectedKey) {
          case 'dashboard':
            return <DashboardPanel />;

          case 'user-list':
            return <Card className="page-card" title="用户列表"><Table columns={userColumns} dataSource={userRows} pagination={false} /></Card>;

          case 'user-groups':
            return <Card className="page-card" title="用户分组"><Table columns={userGroupColumns} dataSource={userGroupRows} pagination={false} /></Card>;

          case 'user-activation-records':
            return <Card className="page-card" title="用户激活记录"><Table columns={activationColumns} dataSource={activationRows} pagination={false} /></Card>;

          case 'card-list':
            return <Card className="page-card" title="卡密列表"><Table columns={cardColumns} dataSource={cardRows} pagination={false} /></Card>;

          case 'card-rules':
            return (
              <Space direction="vertical" style={{ width: '100%' }} size={16}>
                <Card className="page-card" title="批量生成卡密">
                  <Form layout="inline">
                    <Form.Item label="卡密类型"><Select defaultValue="MONTH" style={{ width: 140 }} options={[{ value: 'DAY', label: '天卡' }, { value: 'WEEK', label: '周卡' }, { value: 'MONTH', label: '月卡' }, { value: 'SEASON', label: '季卡' }, { value: 'YEAR', label: '年卡' }, { value: 'FOREVER', label: '无限卡' }]} /></Form.Item>
                    <Form.Item label="数量"><InputNumber min={1} max={2000} defaultValue={100} /></Form.Item>
                    <Button type="primary" onClick={() => Modal.success({ title: '批量生成完成', content: '已模拟生成 100 条卡密。' })}>生成卡密</Button>
                  </Form>
                </Card>
                <Card className="page-card" title="卡密规则"><Table columns={cardRuleColumns} dataSource={cardRuleRows} pagination={false} /></Card>
              </Space>
            );

          case 'card-groups':
            return <Card className="page-card" title="卡密分组"><Table columns={cardGroupColumns} dataSource={cardGroupRows} pagination={false} /></Card>;

          case 'site-config':
            return (
              <Card className="page-card" title="网站配置">
                <Form form={siteForm} layout="vertical">
                  <Form.Item name="siteName" label="网站名称" rules={[{ required: true, message: '请输入网站名称' }]}><Input /></Form.Item>
                  <Form.Item name="contactEmail" label="联系邮箱" rules={[{ required: true, message: '请输入联系邮箱' }]}><Input /></Form.Item>
                  <Button type="primary" onClick={() => saveForm(siteForm)}>保存</Button>
                </Form>
              </Card>
            );

          case 'ens-query-config':
            return (
              <Card className="page-card" title="ENS查询配置">
                <Form form={ensForm} layout="vertical">
                  <Form.Item name="rpcEndpoint" label="RPC 地址" rules={[{ required: true, message: '请输入 RPC 地址' }]}><Input /></Form.Item>
                  <Row gutter={16}>
                    <Col span={8}><Form.Item name="timeoutMs" label="超时(ms)"><InputNumber min={1000} max={120000} style={{ width: '100%' }} /></Form.Item></Col>
                    <Col span={8}><Form.Item name="retryCount" label="重试次数"><InputNumber min={0} max={10} style={{ width: '100%' }} /></Form.Item></Col>
                    <Col span={8}><Form.Item name="parallelRequests" label="并发数"><InputNumber min={1} max={500} style={{ width: '100%' }} /></Form.Item></Col>
                  </Row>
                  <Button type="primary" onClick={() => saveForm(ensForm)}>保存</Button>
                </Form>
              </Card>
            );

          case 'notice-management':
            return (
              <Card className="page-card" title="公告管理" extra={<Button type="primary" onClick={openPublishNotice}>发布公告</Button>}>
                <Table columns={noticeColumns} dataSource={notices} pagination={false} />
              </Card>
            );

          case 'basic-settings':
          case 'security-settings':
          case 'api-settings':
            return (
              <Card className="page-card" title="系统设置">
                <Tabs
                  activeKey={selectedKey}
                  onChange={setSelectedKey}
                  items={[
                    {
                      key: 'basic-settings',
                      label: '基础设置',
                      children: (
                        <Form form={settingForm} layout="vertical">
                          <Form.Item name="siteOpen" label="网站开关" valuePropName="checked"><Switch /></Form.Item>
                          <Button type="primary" onClick={() => saveForm(settingForm)}>保存</Button>
                        </Form>
                      )
                    },
                    {
                      key: 'security-settings',
                      label: '安全设置',
                      children: (
                        <Form form={settingForm} layout="vertical">
                          <Form.Item name="force2FA" label="后台强制 2FA" valuePropName="checked"><Switch /></Form.Item>
                          <Button type="primary" onClick={() => saveForm(settingForm)}>保存</Button>
                        </Form>
                      )
                    },
                    {
                      key: 'api-settings',
                      label: '接口设置',
                      children: (
                        <Form form={settingForm} layout="vertical">
                          <Form.Item name="apiRateLimit" label="接口限流（次/分钟)"><InputNumber min={10} max={5000} /></Form.Item>
                          <Button type="primary" onClick={() => saveForm(settingForm)}>保存</Button>
                        </Form>
                      )
                    }
                  ]}
                />
              </Card>
            );

          default:
            return <Card className="page-card">页面开发中</Card>;
        }
      };

      return (
        <Layout style={{ minHeight: '100vh' }}>
          <Sider collapsible collapsed={collapsed} onCollapse={setCollapsed} theme="dark">
            <div className="admin-logo">OpenDogo</div>
            <Menu
              theme="dark"
              mode="inline"
              selectedKeys={[selectedKey]}
              defaultOpenKeys={['user-management', 'card-management', 'site-management', 'system-settings']}
              items={menuItems}
              onClick={({ key }) => setSelectedKey(key)}
            />
          </Sider>

          <Layout>
            <Header className="admin-header">
              <div className="admin-title">ENS 后台管理系统</div>
              <Space>
                <Tag color="blue">当前账号：{account || '未登录'}</Tag>
                <Button onClick={() => verifySession(token)} disabled={!token}>校验会话</Button>
                <Button danger onClick={logout}>退出登录</Button>
              </Space>
            </Header>

            <Content className="admin-content">
              {renderPage()}
            </Content>
          </Layout>

          <Modal
            title="后台登录"
            open={loginOpen}
            footer={null}
            maskClosable={false}
            closable={false}
            destroyOnClose
          >
            <Form form={loginForm} layout="vertical" onFinish={submitLogin}>
              <Form.Item name="account" label="账号" rules={[{ required: true, message: '请输入账号' }]}>
                <Input autoComplete="username" />
              </Form.Item>
              <Form.Item name="password" label="密码" rules={[{ required: true, message: '请输入密码' }]}>
                <Input.Password autoComplete="current-password" />
              </Form.Item>
              <Form.Item name="twoFactorCode" label="2FA 验证码" rules={[{ required: true, message: '请输入 2FA 验证码' }]}>
                <Input maxLength={12} />
              </Form.Item>
              <Button type="primary" htmlType="submit" block>登录</Button>
            </Form>
          </Modal>

          <Modal
            title="发布公告"
            open={noticeOpen}
            onCancel={() => setNoticeOpen(false)}
            onOk={publishNotice}
            okText="发布"
            cancelText="取消"
            destroyOnClose
          >
            <Form form={noticeForm} layout="vertical">
              <Form.Item name="title" label="公告标题" rules={[{ required: true, message: '请输入公告标题' }]}>
                <Input />
              </Form.Item>
              <Form.Item name="content" label="公告内容" rules={[{ required: true, message: '请输入公告内容' }]}>
                <Input.TextArea rows={5} />
              </Form.Item>
            </Form>
          </Modal>
        </Layout>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
