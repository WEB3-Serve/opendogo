<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ENS 后台管理（React + Ant Design）</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/antd/5.27.1/reset.min.css" />
  <link rel="stylesheet" href="/admin.css" />
  <style>
    /* Fallback when external stylesheet is not reachable */
    .login-wrap { display: flex; justify-content: center; align-items: center; padding: 24px 16px; min-height: 100vh; }
    .login-card { width: min(460px, calc(100vw - 32px)); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/dayjs@1/dayjs.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/antd/5.27.1/antd.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect } = React;
    const {
      Layout, Menu, Card, Statistic, Row, Col, Button, Form, Input, InputNumber, Select,
      Table, Modal, message, Typography, Space, Divider, Tag
    } = antd;
    const { Header, Sider, Content } = Layout;
    const { Title } = Typography;

    const unique = (arr) => Array.from(new Set(arr.filter(Boolean)));
    const normalizeApiBase = (value) => String(value || '').trim().replace(/\/$/, '');
    const isHttpsPage = window.location.protocol === 'https:';
    const isLocalHost = ['localhost', '127.0.0.1'].includes(window.location.hostname);
    const getApiBaseFromQuery = () => {
      try {
        const value = new URLSearchParams(window.location.search).get('api_base');
        return normalizeApiBase(value);
      } catch {
        return '';
      }
    };
    const queryApiBase = getApiBaseFromQuery();
    if (queryApiBase) window.localStorage.setItem('admin_api_base', queryApiBase);
    const cachedApiBase = normalizeApiBase(window.localStorage.getItem('admin_api_base'));
    const originApiProxy = normalizeApiBase(`${window.location.origin}/api`);
    const hostPort3001 = window.location.hostname
      ? normalizeApiBase(`${window.location.protocol}//${window.location.hostname}:3001`)
      : '';
    const localhostApi = 'http://localhost:3001';
    const shouldTryLocalHttp = !isHttpsPage || isLocalHost;
    const API_BASE_CANDIDATES = isLocalHost
      ? unique([queryApiBase, cachedApiBase, localhostApi, window.location.origin, originApiProxy])
      : unique([
          queryApiBase,
          cachedApiBase,
          originApiProxy,
          window.location.origin,
          hostPort3001,
          shouldTryLocalHttp ? localhostApi : ''
        ]);

    const fetchWithTimeout = async (url, options = {}, timeoutMs = 8000) => {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeoutMs);
      try {
        return await fetch(url, { ...options, signal: controller.signal });
      } catch (err) {
        if (err?.name === 'AbortError') {
          throw new Error('REQUEST_TIMEOUT');
        }
        throw err;
      } finally {
        clearTimeout(timer);
      }
    };

    const api = async (path, { method = 'GET', body, token, auth = true } = {}) => {
      const headers = { 'Content-Type': 'application/json' };
      if (auth && token) headers.Authorization = `Bearer ${token}`;

      let lastError = null;
      for (const base of unique(API_BASE_CANDIDATES)) {
        try {
          const res = await fetchWithTimeout(`${base}${path}`, {
            method,
            headers,
            body: body ? JSON.stringify(body) : undefined
          });
          const contentType = res.headers.get('content-type') || '';
          const isJson = contentType.includes('application/json');
          let data = {};
          if (isJson) {
            data = await res.json();
          } else {
            const text = await res.text();
            const compact = String(text || '').replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim();
            const err = new Error(`接口返回了非 JSON 内容：${compact.slice(0, 120) || `HTTP ${res.status}`}`);
            err.code = 'NON_JSON_RESPONSE';
            err.httpStatus = res.status;
            err.base = base;
            throw err;
          }
          if (!res.ok) throw new Error(data.error || String(res.status));
          if (base !== API_BASE_CANDIDATES[0]) {
            window.localStorage.setItem('admin_api_base', base);
          }
          return data;
        } catch (err) {
          lastError = err;
        }
      }

      if (lastError?.message === 'The string did not match the expected pattern.') {
        throw new Error('请求地址异常，请刷新页面重试，或改用系统浏览器打开');
      }
      if (lastError?.message === 'Failed to fetch' || lastError?.message === 'REQUEST_TIMEOUT') {
        const tried = unique(API_BASE_CANDIDATES).join(' , ');
        const mixedContentHint = window.location.protocol === 'https:'
          ? '当前页面是 HTTPS，后端也需要提供 HTTPS，或配置同域反向代理到 /api。'
          : '请确认后端监听地址可访问，且已允许当前来源的跨域请求。';
        const queryHint = isHttpsPage
          ? '你也可以在地址后追加 ?api_base=https://你的后端域名 指定后端。'
          : '你也可以在地址后追加 ?api_base=http://127.0.0.1:3001 指定后端。';
        throw new Error(`无法连接后端服务。已尝试：${tried}。${mixedContentHint} ${queryHint}`);
      }
      if (lastError?.code === 'NON_JSON_RESPONSE' && lastError?.httpStatus === 404) {
        throw new Error(`后端接口不存在，请检查 API 地址。当前候选：${API_BASE_CANDIDATES.join(' , ')}`);
      }
      throw lastError || new Error('请求失败');
    };

    const pageMap = {
      dashboard: '仪表盘',
      users_list: '用户列表',
      users_groups: '用户分组',
      users_activations: '用户激活记录',
      licenses_list: '卡密列表',
      licenses_rules: '卡密规则',
      licenses_groups: '卡密分组',
      site_basic: '网站配置',
      site_ens: 'ENS查询配置',
      site_notice: '公告管理',
      system_basic: '基础设置',
      system_security: '安全设置',
      system_api: '接口设置'
    };

    const errMsgMap = {
      ACCOUNT_OR_PASSWORD_INVALID: '账号或密码错误',
      ACCOUNT_DISABLED: '账号已禁用',
      ACCOUNT_LOCKED: '账号已锁定，请稍后重试',
      LOGIN_TICKET_INVALID: '登录票据无效或已过期，请先重新获取登录票据',
      TWO_FA_NOT_CONFIGURED: '当前管理员未绑定 2FA，请联系系统管理员处理',
      TWO_FA_SECRET_DECRYPT_FAIL: '2FA 密钥异常，请联系系统管理员处理',
      TOTP_INVALID: '2FA 验证码错误，请确认谷歌验证器时间同步后重试'
    };

    const formatError = (err) => {
      return errMsgMap[err?.message] || err?.message || '请求失败';
    };

    function LoginView({ onLogin }) {
      const [form] = Form.useForm();
      const [ticket, setTicket] = useState('');
      const [loading, setLoading] = useState(false);

      const fetchTicket = async (account, password) => {
        const result = await api('/api/admin/auth/login-password', {
          method: 'POST',
          auth: false,
          body: { account, password }
        });
        setTicket(result.login_ticket || '');
        return result.login_ticket;
      };

      const submitLogin = async () => {
        const values = await form.validateFields(['account', 'password', 'totp']);
        setLoading(true);
        try {
          const loginTicket = ticket || await fetchTicket(values.account, values.password);
          const result = await api('/api/admin/auth/login-2fa', {
            method: 'POST',
            auth: false,
            body: { login_ticket: loginTicket, totp_code: values.totp }
          });
          onLogin(result.access_token);
          message.success('登录成功');
        } catch (e) {
          if (e?.message === 'LOGIN_TICKET_INVALID') {
            setTicket('');
          }
          message.error(formatError(e));
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="login-wrap">
          <Card className="login-card" bordered={false}>
            <div className="login-title">
              <Title level={4} style={{ margin: 0 }}>管理员登录</Title>
            </div>
            <Form form={form} layout="vertical">
              <Form.Item label="账号" name="account" rules={[{ required: true, message: '请输入后台账号' }]}>
                <Input placeholder="账号" size="large" />
              </Form.Item>
              <Form.Item label="密码" name="password" rules={[{ required: true, message: '请输入后台密码' }]}>
                <Input.Password placeholder="密码" size="large" />
              </Form.Item>
              <Form.Item
                label="2FA"
                name="totp"
                rules={[
                  { required: true, message: '请输入 2FA 验证码' },
                  { pattern: /^\d{6}$/, message: '2FA 验证码必须是 6 位数字' }
                ]}
              >
                <Input maxLength={6} placeholder="6位验证码" size="large" />
              </Form.Item>
              <Button type="primary" loading={loading} onClick={submitLogin} block size="large">登录</Button>
            </Form>
          </Card>
        </div>
      );
    }

    function DashboardPage({ stats }) {
      const items = [
        ['用户总数', stats.usersTotal], ['卡密总数', stats.licenseTotal], ['已使用卡密', stats.licenseUsed],
        ['未使用卡密', stats.licenseUnused], ['公告数量', stats.notices], ['配置项', stats.configs]
      ];
      return <Row gutter={[12, 12]}>{items.map(([t,v]) => <Col xs={12} md={8} key={t}><Card><Statistic title={t} value={v || 0} /></Card></Col>)}</Row>;
    }

    function App() {
      const [token, setToken] = useState('');
      const [selectedKey, setSelectedKey] = useState('dashboard');
      const [stats, setStats] = useState({});
      const [users, setUsers] = useState([]);
      const [userDetail, setUserDetail] = useState(null);
      const [userDetailOpen, setUserDetailOpen] = useState(false);
      const [userGroups, setUserGroups] = useState([]);
      const [activations, setActivations] = useState([]);
      const [licenses, setLicenses] = useState([]);
      const [licenseGroups, setLicenseGroups] = useState([]);
      const [generatedCodes, setGeneratedCodes] = useState([]);
      const [codesOpen, setCodesOpen] = useState(false);
      const [notices, setNotices] = useState([]);
      const [noticeOpen, setNoticeOpen] = useState(false);
      const [loading, setLoading] = useState(false);
      const [searchUser, setSearchUser] = useState('');
      const [activationAccount, setActivationAccount] = useState('');
      const [licenseStatus, setLicenseStatus] = useState('ALL');
      const [forms] = useState({
        userGroup: Form.useForm()[0],
        licenseGroup: Form.useForm()[0],
        licenseRule: Form.useForm()[0],
        siteBasic: Form.useForm()[0],
        siteEns: Form.useForm()[0],
        systemBasic: Form.useForm()[0],
        systemSecurity: Form.useForm()[0],
        systemApi: Form.useForm()[0],
        notice: Form.useForm()[0]
      });

      const loadDashboard = async () => setStats((await api('/api/admin/dashboard', { token })).stats || {});
      const loadUsers = async () => setUsers((await api(`/api/admin/users${searchUser ? `?q=${encodeURIComponent(searchUser)}` : ''}`, { token })).users || []);
      const loadUserGroups = async () => setUserGroups((await api('/api/admin/user-groups', { token })).groups || []);
      const loadActivations = async () => setActivations((await api(`/api/admin/user-activations${activationAccount ? `?account=${encodeURIComponent(activationAccount)}` : ''}`, { token })).logs || []);
      const loadLicenseGroups = async () => setLicenseGroups((await api('/api/admin/license-groups', { token })).groups || []);
      const loadLicenses = async () => setLicenses((await api(`/api/admin/licenses?status=${licenseStatus}`, { token })).licenses || []);
      const loadNotices = async () => setNotices((await api('/api/admin/notices', { token })).notices || []);

      const saveConfig = async (category, values) => {
        await api(`/api/admin/configs/${category}`, { method: 'POST', token, body: values });
        message.success('保存成功');
      };

      useEffect(() => {
        if (!token) return;
        setLoading(true);
        Promise.all([loadDashboard(), loadUsers(), loadUserGroups(), loadActivations(), loadLicenseGroups(), loadLicenses(), loadNotices()])
          .catch((e) => message.error(e.message))
          .finally(() => setLoading(false));
      }, [token]);

      if (!token) return <LoginView onLogin={setToken} />;

      const menuItems = [
        { key: 'dashboard', label: '仪表盘' },
        { key: 'users', label: '用户管理', children: [{ key: 'users_list', label: '用户列表' }, { key: 'users_groups', label: '用户分组' }, { key: 'users_activations', label: '用户激活记录' }] },
        { key: 'licenses', label: '卡密管理', children: [{ key: 'licenses_list', label: '卡密列表' }, { key: 'licenses_rules', label: '卡密规则' }, { key: 'licenses_groups', label: '卡密分组' }] },
        { key: 'site', label: '网站管理', children: [{ key: 'site_basic', label: '网站配置' }, { key: 'site_ens', label: 'ENS查询配置' }, { key: 'site_notice', label: '公告管理' }] },
        { key: 'system', label: '系统设置', children: [{ key: 'system_basic', label: '基础设置' }, { key: 'system_security', label: '安全设置' }, { key: 'system_api', label: '接口设置' }] }
      ];

      const userColumns = [
        { title: '账号', dataIndex: 'account' },
        { title: '状态', dataIndex: 'status', render: (v) => <Tag>{v}</Tag> },
        { title: '分组', render: (_, r) => r.group?.name || '-' },
        { title: '激活次数', render: (_, r) => r._count?.licenses || 0 },
        { title: '操作', render: (_, r) => <Button size="small" onClick={async () => { const d = await api(`/api/admin/users/${r.id}`, { token }); setUserDetail(d); setUserDetailOpen(true); }}>详情</Button> }
      ];

      const activationColumns = [
        { title: '用户', render: (_, r) => r.user?.account || '-' },
        { title: '卡密类型', render: (_, r) => r.license?.codeType || '-' },
        { title: '状态', render: (_, r) => r.license?.status || '-' },
        { title: '激活时间', dataIndex: 'createdAt' }
      ];

      const licenseColumns = [
        { title: '类型', dataIndex: 'codeType' },
        { title: '状态', dataIndex: 'status', render: (v) => <Tag color={v === 'USED' ? 'orange' : 'green'}>{v}</Tag> },
        { title: '使用人', render: (_, r) => r.usedBy?.account || '-' },
        { title: '分组', render: (_, r) => r.batch?.group?.name || '-' },
        { title: '创建时间', dataIndex: 'createdAt' }
      ];

      const noticeColumns = [
        { title: '标题', dataIndex: 'title' },
        { title: '状态', dataIndex: 'status' },
        { title: '创建时间', dataIndex: 'createdAt' },
        { title: '操作', render: (_, r) => <Button danger size="small" onClick={async () => { await api(`/api/admin/notices/${r.id}`, { method: 'DELETE', token }); await loadNotices(); }}>删除</Button> }
      ];

      return (
        <Layout style={{ minHeight: '100vh' }}>
          <Sider width={260} theme="dark">
            <div className="logo">ENS 管理后台</div>
            <Menu theme="dark" mode="inline" items={menuItems} selectedKeys={[selectedKey]} defaultOpenKeys={['users','licenses','site','system']} onClick={(e) => setSelectedKey(e.key)} />
            <div className="sider-footer"><Button danger block onClick={() => setToken('')}>退出登录</Button></div>
          </Sider>
          <Layout>
            <Header className="header"><Title level={4} style={{ margin: 0 }}>{pageMap[selectedKey]}</Title></Header>
            <Content className="content">
              {selectedKey === 'dashboard' && <DashboardPage stats={stats} />}

              {selectedKey === 'users_list' && <Card title="用户列表" extra={<Space><Input value={searchUser} onChange={(e)=>setSearchUser(e.target.value)} placeholder="账号或ID" /><Button onClick={loadUsers}>查询</Button></Space>}><Table loading={loading} rowKey="id" dataSource={users} columns={userColumns} pagination={false} /></Card>}

              {selectedKey === 'users_groups' && <Card title="用户分组"><Form form={forms.userGroup} layout="inline" onFinish={async (v)=>{ await api('/api/admin/user-groups',{method:'POST',token,body:v}); forms.userGroup.resetFields(); await loadUserGroups(); }}><Form.Item name="name" rules={[{required:true}]}><Input placeholder="分组名" /></Form.Item><Form.Item name="description"><Input placeholder="描述" /></Form.Item><Button type="primary" htmlType="submit">新建分组</Button></Form><Divider /><Table rowKey="id" dataSource={userGroups} columns={[{title:'名称',dataIndex:'name'},{title:'描述',dataIndex:'description'},{title:'用户数',render:(_,r)=>r._count?.users||0},{title:'创建时间',dataIndex:'createdAt'}]} pagination={false} /></Card>}

              {selectedKey === 'users_activations' && <Card title="用户激活记录" extra={<Space><Input value={activationAccount} onChange={(e)=>setActivationAccount(e.target.value)} placeholder="账号筛选" /><Button onClick={loadActivations}>查询</Button></Space>}><Table rowKey="id" dataSource={activations} columns={activationColumns} pagination={false} /></Card>}

              {selectedKey === 'licenses_list' && <Card title="卡密列表" extra={<Space><Select value={licenseStatus} onChange={setLicenseStatus} options={[{value:'ALL',label:'全部'},{value:'UNUSED',label:'未使用'},{value:'USED',label:'已使用'}]} style={{width:120}} /><Button onClick={loadLicenses}>刷新</Button></Space>}><Table rowKey="id" dataSource={licenses} columns={licenseColumns} pagination={false} /></Card>}

              {selectedKey === 'licenses_rules' && <Card title="卡密规则 / 生成"><Form form={forms.licenseRule} layout="vertical" initialValues={{ name:'首发批次', quantity:5, type:'MONTH' }} onFinish={async (v)=>{ const ret = await api('/api/admin/licenses/generate',{method:'POST',token,body:v}); setGeneratedCodes(ret.codes||[]); setCodesOpen(true); await Promise.all([loadLicenses(),loadDashboard()]); }}><Row gutter={12}><Col span={6}><Form.Item name="name" label="批次名" rules={[{required:true}]}><Input /></Form.Item></Col><Col span={4}><Form.Item name="quantity" label="数量"><InputNumber min={1} max={500} style={{width:'100%'}} /></Form.Item></Col><Col span={6}><Form.Item name="type" label="卡类型"><Select options={[{value:'DAY',label:'天卡'},{value:'WEEK',label:'周卡'},{value:'MONTH',label:'月卡'},{value:'QUARTER',label:'季度卡'},{value:'YEAR',label:'年卡'},{value:'LIFETIME',label:'无限卡'}]} /></Form.Item></Col><Col span={6}><Form.Item name="groupId" label="卡密分组"><Select allowClear options={licenseGroups.map(g=>({value:g.id,label:g.name}))} /></Form.Item></Col></Row><Button type="primary" htmlType="submit">生成卡密</Button></Form></Card>}

              {selectedKey === 'licenses_groups' && <Card title="卡密分组"><Form form={forms.licenseGroup} layout="inline" onFinish={async (v)=>{ await api('/api/admin/license-groups',{method:'POST',token,body:v}); forms.licenseGroup.resetFields(); await loadLicenseGroups(); }}><Form.Item name="name" rules={[{required:true}]}><Input placeholder="分组名" /></Form.Item><Form.Item name="description"><Input placeholder="描述" /></Form.Item><Button type="primary" htmlType="submit">新建分组</Button></Form><Divider /><Table rowKey="id" dataSource={licenseGroups} columns={[{title:'名称',dataIndex:'name'},{title:'描述',dataIndex:'description'},{title:'批次数',render:(_,r)=>r._count?.batches||0},{title:'创建时间',dataIndex:'createdAt'}]} pagination={false} /></Card>}

              {selectedKey === 'site_basic' && <Card title="网站配置"><Form form={forms.siteBasic} layout="vertical" onFinish={(v)=>saveConfig('website',v)}><Form.Item name="name" label="网站名称"><Input /></Form.Item><Form.Item name="logo" label="Logo"><Input /></Form.Item><Form.Item name="description" label="描述"><Input.TextArea rows={3} /></Form.Item><Button type="primary" htmlType="submit">保存</Button></Form></Card>}

              {selectedKey === 'site_ens' && <Card title="ENS查询配置"><Form form={forms.siteEns} layout="vertical" onFinish={(v)=>saveConfig('ens',{...v,rpcNodes:String(v.rpcNodes||'').split(',').map(s=>s.trim()).filter(Boolean)})}><Form.Item name="rpcNodes" label="RPC节点（逗号分隔)"><Input /></Form.Item><Form.Item name="rateLimit" label="限流 QPS"><InputNumber min={1} style={{width:'100%'}} /></Form.Item><Form.Item name="enabled" label="开关"><Select options={[{value:true,label:'开启'},{value:false,label:'关闭'}]} /></Form.Item><Button type="primary" htmlType="submit">保存</Button></Form></Card>}

              {selectedKey === 'site_notice' && <Card title="公告管理" extra={<Button type="primary" onClick={()=>setNoticeOpen(true)}>发布公告</Button>}><Table rowKey="id" dataSource={notices} columns={noticeColumns} pagination={false} /></Card>}

              {selectedKey === 'system_basic' && <Card title="基础设置"><Form form={forms.systemBasic} layout="vertical" onFinish={(v)=>saveConfig('system-basic',v)}><Form.Item name="defaultUserGroup" label="默认用户组"><Input /></Form.Item><Button type="primary" htmlType="submit">保存</Button></Form></Card>}

              {selectedKey === 'system_security' && <Card title="安全设置"><Form form={forms.systemSecurity} layout="vertical" onFinish={(v)=>saveConfig('system-security',v)}><Form.Item name="jwtExpire" label="JWT过期"><Input placeholder="15m" /></Form.Item><Form.Item name="loginMaxFail" label="登录失败限制"><InputNumber min={1} style={{width:'100%'}} /></Form.Item><Button type="primary" htmlType="submit">保存</Button></Form></Card>}

              {selectedKey === 'system_api' && <Card title="接口设置"><Form form={forms.systemApi} layout="vertical" onFinish={(v)=>saveConfig('system-api',v)}><Form.Item name="rateLimit" label="接口限流"><InputNumber min={1} style={{width:'100%'}} /></Form.Item><Form.Item name="enabled" label="API开关"><Select options={[{value:true,label:'开启'},{value:false,label:'关闭'}]} /></Form.Item><Button type="primary" htmlType="submit">保存</Button></Form></Card>}
            </Content>
          </Layout>

          <Modal open={userDetailOpen} onCancel={() => setUserDetailOpen(false)} footer={null} title="用户详情与激活记录" width={880}>
            <pre className="json-pre">{JSON.stringify(userDetail, null, 2)}</pre>
          </Modal>

          <Modal open={codesOpen} onCancel={() => setCodesOpen(false)} footer={null} title="生成的卡密" width={760}>
            <pre className="json-pre">{generatedCodes.join('\n')}</pre>
          </Modal>

          <Modal open={noticeOpen} onCancel={() => setNoticeOpen(false)} onOk={() => forms.notice.submit()} title="发布公告">
            <Form form={forms.notice} layout="vertical" onFinish={async (v)=>{ await api('/api/admin/notices',{method:'POST',token,body:v}); setNoticeOpen(false); forms.notice.resetFields(); await Promise.all([loadNotices(),loadDashboard()]); }}>
              <Form.Item name="title" label="标题" rules={[{required:true}]}><Input /></Form.Item>
              <Form.Item name="content" label="内容" rules={[{required:true}]}><Input.TextArea rows={4} /></Form.Item>
            </Form>
          </Modal>
        </Layout>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
