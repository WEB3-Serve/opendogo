name = "ens-manager"
main = "index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# 静态文件配置 - 服务 HTML 文件
[site]
bucket = "."
include = ["**/*.html"]
exclude = ["node_modules/**", ".git/**", "*.md", "scripts/**", "lib/**", "middleware/**", ".dev.vars", ".gitignore", "package*.json", "ARCHITECTURE.md", "README.md"]

[[rules]]
type = "Text"
globs = ["**/*.html"]
fallthrough = true

[vars]
ADMIN_ACCOUNT = "admin@example.com"
ADMIN_PASSWORD = "admin123"
ADMIN_2FA_SECRET = "JBSWY3DPEHPK3PXP"
JWT_SECRET = "your-super-secret-jwt-key-change-in-production"
JWT_EXPIRES_IN = "4h"
ALLOWED_DOMAINS = "*"
UNAUTHORIZED_REDIRECT_URL = "/login"
# SUPABASE_URL 和 SUPABASE_ANON_KEY 请在 .dev.vars (本地) 或 Vercel 环境变量中配置
