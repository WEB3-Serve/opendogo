name = "ens-manager"
main = "api/auth/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[[rules]]
type = "Text"
globs = ["**/*.html"]
fallthrough = true

[vars]
ADMIN_ACCOUNT = "admin@example.com"
ADMIN_PASSWORD = "admin123"
ADMIN_2FA_SECRET = "JBSWY3DPEHPK3PXP"
JWT_SECRET = "your-super-secret-jwt-key-change-in-production"
JWT_EXPIRES_IN = "4h"
ALLOWED_DOMAINS = "*"
UNAUTHORIZED_REDIRECT_URL = "/login"

